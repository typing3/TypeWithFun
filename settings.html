<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
    name="viewport"
    content="width=device-width, initial-scale=1.0">

<title>
    TypeWithFun • Settings
</title>

<link
    rel="preconnect"
    href="https://fonts.googleapis.com">

<link
    rel="preconnect"
    href="https://fonts.gstatic.com"
    crossorigin>

<link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet">

<link
    rel="stylesheet"
    href="style.css">

<link
    rel="stylesheet"
    href="components.css">

<link
    rel="stylesheet"
    href="animations.css">

<link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

<div id="particles"></div>

<nav class="navbar glass">

    <div>

        <a
            href="../index.html"
            class="btn btn-secondary">

            Home

        </a>

        <button
            onclick="history.back()"
            class="btn btn-secondary">

            Back

        </button>

    </div>

    <h2>
        Settings
    </h2>

</nav>

<main class="settings-page">

    <section class="glass card">

        <h1>
            Appearance
        </h1>

        <div class="form-group">

            <label>
                Theme
            </label>

            <select id="themeSelect">

                <option value="dark">
                    Dark
                </option>

                <option value="light">
                    Light
                </option>

            </select>

        </div>

        <div class="form-group">

            <label>
                Font Size
            </label>

            <select id="fontSizeSelect">

                <option value="small">
                    Small
                </option>

                <option value="medium">
                    Medium
                </option>

                <option value="large">
                    Large
                </option>

            </select>

        </div>

    </section>

    <section class="glass card">

        <h2>
            Typing
        </h2>

        <div class="form-group">

            <label>
                Typing Sounds
            </label>

            <select id="soundSelect">

                <option value="true">
                    On
                </option>

                <option value="false">
                    Off
                </option>

            </select>

        </div>

        <div class="form-group">

            <label>
                Animations
            </label>

            <select id="animationSelect">

                <option value="true">
                    On
                </option>

                <option value="false">
                    Off
                </option>

            </select>

        </div>

    </section>

    <section class="glass card">

        <button
            id="saveSettingsButton"
            class="btn btn-primary">

            Save Settings

        </button>

    </section>

</main>

<script src="../js/storage.js"></script>
<script src="../js/app.js"></script>
<script src="../js/settings.js"></script>

</body>

</html>
