<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>
        TypeWithFun • Practice
    </title>

    <meta
        name="description"
        content="Improve your typing speed and accuracy with TypeWithFun.">

    <link
        rel="preconnect"
        href="https://fonts.googleapis.com">

    <link
        rel="preconnect"
        href="https://fonts.gstatic.com"
        crossorigin>

    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <link
        rel="stylesheet"
        href="../css/style.css">

    <link
        rel="stylesheet"
        href="../css/components.css">

    <link
        rel="stylesheet"
        href="../css/animations.css">

    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

    <!-- =====================================
         PARTICLES
         ===================================== -->

    <div
        id="particles"
        class="particles">
    </div>

    <!-- =====================================
         NAVBAR
         ===================================== -->

    <nav class="navbar glass">

        <div class="nav-left">

            <button
                id="homeButton"
                class="btn btn-secondary">

                <i class="fas fa-home"></i>
                Home

            </button>

            <button
                id="backButton"
                class="btn btn-secondary">

                <i class="fas fa-arrow-left"></i>
                Back

            </button>

        </div>

        <div class="nav-center">

            <h2>
                TypeWithFun
            </h2>

        </div>

        <div class="nav-right">

            <a
                href="profile.html"
                class="btn btn-secondary">

                Profile

            </a>

        </div>

    </nav>

    <!-- =====================================
         MAIN
         ===================================== -->

    <main class="practice-page">

        <!-- ==========================
             TOP CONTROLS
             ========================== -->

        <section class="glass card">

            <h1>
                Typing Practice
            </h1>

            <div class="practice-controls">

                <!-- CATEGORY -->

                <div class="form-group">

                    <label
                        for="categorySelect">

                        Category

                    </label>

                    <select
                        id="categorySelect">

                        <option value="quotes">
                            Quotes
                        </option>

                        <option value="words">
                            Random Words
                        </option>

                        <option value="paragraphs">
                            Paragraphs
                        </option>

                        <option value="books">
                            Book Excerpts
                        </option>

                    </select>

                </div>

                <!-- TEXT -->

                <div class="form-group">

                    <label
                        for="textSelect">

                        Text

                    </label>

                    <select
                        id="textSelect">

                        <option>
                            Random Selection
                        </option>

                    </select>

                </div>

                <!-- TIMER -->

                <div class="form-group">

                    <label
                        for="timerSelect">

                        Timer

                    </label>

                    <select
                        id="timerSelect">

                        <option value="15">
                            15 Seconds
                        </option>

                        <option value="30">
                            30 Seconds
                        </option>

                        <option value="60"
                            selected>

                            60 Seconds

                        </option>

                        <option value="120">
                            120 Seconds
                        </option>

                        <option value="custom">
                            Custom
                        </option>

                    </select>

                </div>

                <!-- CUSTOM TIMER -->

                <div
                    class="form-group"
                    id="customTimerContainer"
                    style="display:none;">

                    <label
                        for="customTimerInput">

                        Custom Seconds

                    </label>

                    <input
                        id="customTimerInput"
                        type="number"
                        min="5"
                        max="600"
                        value="60">

                </div>

            </div>

        </section>

        <!-- ==========================
             LIVE STATS
             ========================== -->

        <section
            class="stats-grid">

            <div
                class="glass stat-card">

                <span>
                    WPM
                </span>

                <h2
                    id="wpmDisplay">

                    0

                </h2>

            </div>

            <div
                class="glass stat-card">

                <span>
                    CPM
                </span>

                <h2
                    id="cpmDisplay">

                    0

                </h2>

            </div>

            <div
                class="glass stat-card">

                <span>
                    Accuracy
                </span>

                <h2
                    id="accuracyDisplay">

                    100%

                </h2>

            </div>

            <div
                class="glass stat-card">

                <span>
                    Errors
                </span>

                <h2
                    id="errorDisplay">

                    0

                </h2>

            </div>

            <div
                class="glass stat-card">

                <span>
                    Progress
                </span>

                <h2
                    id="progressDisplay">

                    0%

                </h2>

            </div>

            <div
                class="glass stat-card">

                <span>
                    Time Left
                </span>

                <h2
                    id="timerDisplay">

                    60

                </h2>

            </div>

        </section>

        <!-- ==========================
             TEXT AREA
             ========================== -->

        <section
            class="glass card typing-section">

            <div
                id="typingText"
                class="typing-text"
                aria-live="polite">

            </div>

        </section>

        <!-- ==========================
             INPUT
             ========================== -->

        <section
            class="glass card">

            <input
                id="typingInput"
                class="typing-input"
                type="text"
                autocomplete="off"
                spellcheck="false"
                placeholder="Click Start and begin typing..."
                aria-label="Typing Input">

        </section>

        <!-- ==========================
             ACTION BUTTONS
             ========================== -->

        <section
            class="action-buttons">

            <button
                id="startButton"
                class="btn btn-primary">

                <i class="fas fa-play"></i>
                Start

            </button>

            <button
                id="pauseButton"
                class="btn btn-secondary">

                <i class="fas fa-pause"></i>
                Pause

            </button>

            <button
                id="resumeButton"
                class="btn btn-secondary">

                <i class="fas fa-forward"></i>
                Resume

            </button>

            <button
                id="restartButton"
                class="btn btn-secondary">

                <i class="fas fa-rotate-right"></i>
                Restart

            </button>

            <button
                id="skipButton"
                class="btn btn-secondary">

                <i class="fas fa-forward-step"></i>
                Skip

            </button>

        </section>

    </main>

    <!-- =====================================
         RESULTS MODAL
         ===================================== -->

    <div
        id="resultModal"
        class="modal hidden">

        <div
            class="modal-content glass">

            <h2>
                🎉 Congratulations!
            </h2>

            <div
                id="resultContent">

            </div>

            <div
                class="modal-actions">

                <button
                    id="retryButton"
                    class="btn btn-primary">

                    Retry

                </button>

                <button
                    id="newPracticeButton"
                    class="btn btn-secondary">

                    New Practice

                </button>

                <a
                    href="profile.html"
                    class="btn btn-secondary">

                    View Profile

                </a>

            </div>

        </div>

    </div>

    <!-- =====================================
         DATASETS
         ===================================== -->

    <script src="../data/quotes.js"></script>
    <script src="../data/words.js"></script>
    <script src="../data/paragraphs.js"></script>
    <script src="../data/books.js"></script>

    <!-- =====================================
         CORE
         ===================================== -->

    <script src="../js/storage.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/app.js"></script>

    <!-- =====================================
         PRACTICE ENGINE
         ===================================== -->

    <script src="../js/typing.js"></script>

</body>

</html>
