<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>
        TypeWithFun • Leaderboard
    </title>

    <link
        rel="preconnect"
        href="https://fonts.googleapis.com">

    <link
        rel="preconnect"
        href="https://fonts.gstatic.com"
        crossorigin>

    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <link
        rel="stylesheet"
        href="../css/style.css">

    <link
        rel="stylesheet"
        href="../css/components.css">

    <link
        rel="stylesheet"
        href="../css/animations.css">

    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

    <div
        id="particles"
        class="particles">
    </div>

    <!-- NAVBAR -->

    <nav class="navbar glass">

        <div class="nav-left">

            <a
                href="../index.html"
                class="btn btn-secondary">

                <i class="fas fa-home"></i>
                Home

            </a>

            <button
                onclick="history.back()"
                class="btn btn-secondary">

                <i class="fas fa-arrow-left"></i>
                Back

            </button>

        </div>

        <div class="nav-center">

            <h2>
                Global Leaderboard
            </h2>

        </div>

        <div class="nav-right">

            <a
                href="profile.html"
                class="btn btn-secondary">

                Profile

            </a>

        </div>

    </nav>

    <main class="leaderboard-page">

        <!-- PERIOD FILTER -->

        <section
            class="glass card">

            <h1>
                Top Typists
            </h1>

            <div
                class="leaderboard-controls">

                <select
                    id="periodFilter">

                    <option value="daily">
                        Daily
                    </option>

                    <option value="weekly">
                        Weekly
                    </option>

                    <option value="monthly">
                        Monthly
                    </option>

                    <option value="yearly">
                        Yearly
                    </option>

                    <option
                        value="alltime"
                        selected>

                        All-Time

                    </option>

                </select>

                <select
                    id="sortFilter">

                    <option value="wpm">
                        Highest WPM
                    </option>

                    <option value="accuracy">
                        Highest Accuracy
                    </option>

                    <option value="tests">
                        Most Tests
                    </option>

                    <option value="date">
                        Earliest Achievement
                    </option>

                </select>

            </div>

        </section>

        <!-- TABLE -->

        <section
            class="glass card">

            <table
                class="leaderboard-table">

                <thead>

                    <tr>

                        <th>
                            Rank
                        </th>

                        <th>
                            Avatar
                        </th>

                        <th>
                            Username
                        </th>

                        <th>
                            Best WPM
                        </th>

                        <th>
                            Accuracy
                        </th>

                        <th>
                            Tests
                        </th>

                    </tr>

                </thead>

                <tbody
                    id="leaderboardBody">

                </tbody>

            </table>

        </section>

    </main>

    <script src="../js/storage.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/app.js"></script>
    <script src="../js/leaderboard.js"></script>

</body>

</html>
