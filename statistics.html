 <!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>
        TypeWithFun • Statistics
    </title>

    <link
        rel="preconnect"
        href="https://fonts.googleapis.com">

    <link
        rel="preconnect"
        href="https://fonts.gstatic.com"
        crossorigin>

    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <link
        rel="stylesheet"
        href="../css/style.css">

    <link
        rel="stylesheet"
        href="../css/components.css">

    <link
        rel="stylesheet"
        href="../css/animations.css">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

    <div
        id="particles"
        class="particles">
    </div>

    <nav class="navbar glass">

        <div class="nav-left">

            <a
                href="../index.html"
                class="btn btn-secondary">

                🏠 Home

            </a>

            <button
                onclick="history.back()"
                class="btn btn-secondary">

                ← Back

            </button>

        </div>

        <div class="nav-center">

            <h2>
                Statistics Dashboard
            </h2>

        </div>

    </nav>

    <main class="container">

        <section class="glass card">

            <h1>
                📊 Performance Analytics
            </h1>

            <p>
                Track your typing growth and performance.
            </p>

        </section>

        <!-- SUMMARY -->

        <section class="stats-grid">

            <div class="glass card">

                <h3>
                    Tests Completed
                </h3>

                <h2 id="totalTests">
                    0
                </h2>

            </div>

            <div class="glass card">

                <h3>
                    Best WPM
                </h3>

                <h2 id="bestWPM">
                    0
                </h2>

            </div>

            <div class="glass card">

                <h3>
                    Average WPM
                </h3>

                <h2 id="averageWPM">
                    0
                </h2>

            </div>

            <div class="glass card">

                <h3>
                    Average Accuracy
                </h3>

                <h2 id="averageAccuracy">
                    0%
                </h2>

            </div>

            <div class="glass card">

                <h3>
                    Total Typing Time
                </h3>

                <h2 id="totalTypingTime">
                    0m
                </h2>

            </div>

            <div class="glass card">

                <h3>
                    Total Errors
                </h3>

                <h2 id="totalErrors">
                    0
                </h2>

            </div>

        </section>

        <!-- CHARTS -->

        <section class="stats-grid">

            <div class="glass card chart-card">

                <h3>
                    WPM Progress
                </h3>

                <canvas id="wpmChart"></canvas>

            </div>

            <div class="glass card chart-card">

                <h3>
                    Accuracy Progress
                </h3>

                <canvas id="accuracyChart"></canvas>

            </div>

            <div class="glass card chart-card">

                <h3>
                    Errors Per Test
                </h3>

                <canvas id="errorChart"></canvas>

            </div>

            <div class="glass card chart-card">

                <h3>
                    Time Per Test
                </h3>

                <canvas id="timeChart"></canvas>

            </div>

        </section>

    </main>

    <script>

        document.addEventListener(
            "DOMContentLoaded",
            () => {

                let history = [];

                try {

                    history =
                        JSON.parse(
                            localStorage.getItem(
                                "twf_typing_history"
                            )
                        ) || [];

                } catch {

                    history = [];
                }

                const labels =
                    history.map(
                        (_, index) =>
                            `#${index + 1}`
                    );

                const bestWPM =
                    history.length
                        ? Math.max(
                              ...history.map(
                                  item =>
                                      item.wpm || 0
                              )
                          )
                        : 0;

                const averageWPM =
                    history.length
                        ? Math.round(
                              history.reduce(
                                  (total, item) =>
                                      total +
                                      (item.wpm || 0),
                                  0
                              ) /
                                  history.length
                          )
                        : 0;

                const averageAccuracy =
                    history.length
                        ? Math.round(
                              history.reduce(
                                  (total, item) =>
                                      total +
                                      (item.accuracy || 0),
                                  0
                              ) /
                                  history.length
                          )
                        : 0;

                const totalTime =
                    history.reduce(
                        (total, item) =>
                            total +
                            (item.timeTaken || 0),
                        0
                    );

                const totalErrors =
                    history.reduce(
                        (total, item) =>
                            total +
                            (item.errors || 0),
                        0
                    );

                document.getElementById(
                    "totalTests"
                ).textContent =
                    history.length;

                document.getElementById(
                    "bestWPM"
                ).textContent =
                    bestWPM;

                document.getElementById(
                    "averageWPM"
                ).textContent =
                    averageWPM;

                document.getElementById(
                    "averageAccuracy"
                ).textContent =
                    averageAccuracy + "%";

                document.getElementById(
                    "totalTypingTime"
                ).textContent =
                    Math.round(
                        totalTime / 60
                    ) + "m";

                document.getElementById(
                    "totalErrors"
                ).textContent =
                    totalErrors;

                new Chart(
                    document.getElementById(
                        "wpmChart"
                    ),
                    {
                        type: "line",
                        data: {
                            labels,
                            datasets: [{
                                label: "WPM",
                                data: history.map(
                                    item =>
                                        item.wpm
                                ),
                                borderWidth: 2
                            }]
                        }
                    }
                );

                new Chart(
                    document.getElementById(
                        "accuracyChart"
                    ),
                    {
                        type: "line",
                        data: {
                            labels,
                            datasets: [{
                                label:
                                    "Accuracy %",
                                data: history.map(
                                    item =>
                                        item.accuracy
                                ),
                                borderWidth: 2
                            }]
                        }
                    }
                );

                new Chart(
                    document.getElementById(
                        "errorChart"
                    ),
                    {
                        type: "bar",
                        data: {
                            labels,
                            datasets: [{
                                label: "Errors",
                                data: history.map(
                                    item =>
                                        item.errors
                                )
                            }]
                        }
                    }
                );

                new Chart(
                    document.getElementById(
                        "timeChart"
                    ),
                    {
                        type: "bar",
                        data: {
                            labels,
                            datasets: [{
                                label:
                                    "Time (sec)",
                                data: history.map(
                                    item =>
                                        item.timeTaken
                                )
                            }]
                        }
                    }
                );
            }
        );

    </script>

</body>

</html>
