<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>
        TypeWithFun • Statistics
    </title>

    <!-- Google Fonts -->
    <link
        rel="preconnect"
        href="https://fonts.googleapis.com">

    <link
        rel="preconnect"
        href="https://fonts.gstatic.com"
        crossorigin>

    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <!-- CSS -->
    <link
        rel="stylesheet"
        href="../css/style.css">

    <link
        rel="stylesheet"
        href="../css/components.css">

    <link
        rel="stylesheet"
        href="../css/animations.css">

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

    <!-- Particle Background -->

    <div
        id="particles"
        class="particles">
    </div>

    <!-- Navigation -->

    <nav
        class="navbar glass">

        <div
            class="nav-left">

            <a
                href="../index.html"
                class="btn btn-secondary">

                🏠 Home

            </a>

            <button
                onclick="history.back()"
                class="btn btn-secondary">

                ← Back

            </button>

        </div>

        <div
            class="nav-center">

            <h2>
                Statistics Dashboard
            </h2>

        </div>

    </nav>

    <!-- Main Content -->

    <main
        class="container">

        <!-- Header -->

        <section
            class="glass card">

            <h1>
                📊 Performance Analytics
            </h1>

            <p>
                Track your typing performance,
                accuracy and progress over time.
            </p>

        </section>

        <!-- Summary Cards -->

        <section
            class="stats-grid">

            <div
                class="glass card">

                <h3>
                    Tests Completed
                </h3>

                <h2
                    id="totalTests">

                    0

                </h2>

            </div>

            <div
                class="glass card">

                <h3>
                    Best WPM
                </h3>

                <h2
                    id="bestWPM">

                    0

                </h2>

            </div>

            <div
                class="glass card">

                <h3>
                    Average Accuracy
                </h3>

                <h2
                    id="averageAccuracy">

                    0%

                </h2>

            </div>

            <div
                class="glass card">

                <h3>
                    Total Typing Time
                </h3>

                <h2
                    id="totalTypingTime">

                    0m

                </h2>

            </div>

        </section>

        <!-- Charts -->

        <section
            class="stats-grid">

            <div
                class="glass card chart-card">

                <h3>
                    WPM Progress
                </h3>

                <canvas
                    id="wpmChart">
                </canvas>

            </div>

            <div
                class="glass card chart-card">

                <h3>
                    Accuracy Progress
                </h3>

                <canvas
                    id="accuracyChart">
                </canvas>

            </div>

            <div
                class="glass card chart-card">

                <h3>
                    Practice Frequency
                </h3>

                <canvas
                    id="frequencyChart">
                </canvas>

            </div>

            <div
                class="glass card chart-card">

                <h3>
                    Typing Time
                </h3>

                <canvas
                    id="timeChart">
                </canvas>

            </div>

        </section>

    </main>

    <!-- Scripts -->

    <script src="../js/storage.js"></script>
    <script src="../js/app.js"></script>
    <script src="../js/statistics.js"></script>

    <script>

        document.addEventListener(
            "DOMContentLoaded",
            () => {

                try {

                    const history =
                        JSON.parse(
                            localStorage.getItem(
                                "twf_typing_history"
                            )
                        ) || [];

                    document.getElementById(
                        "totalTests"
                    ).textContent =
                        history.length;

                    const bestWPM =
                        history.length
                            ? Math.max(
                                  ...history.map(
                                      item =>
                                          item.wpm || 0
                                  )
                              )
                            : 0;

                    document.getElementById(
                        "bestWPM"
                    ).textContent =
                        bestWPM;

                    const avgAccuracy =
                        history.length
                            ? Math.round(
                                  history.reduce(
                                      (
                                          total,
                                          item
                                      ) =>
                                          total +
                                          (
                                              item.accuracy ||
                                              0
                                          ),
                                      0
                                  ) /
                                      history.length
                              )
                            : 0;

                    document.getElementById(
                        "averageAccuracy"
                    ).textContent =
                        avgAccuracy + "%";

                    const totalTime =
                        history.reduce(
                            (
                                total,
                                item
                            ) =>
                                total +
                                (
                                    item.timeTaken ||
                                    0
                                ),
                            0
                        );

                    document.getElementById(
                        "totalTypingTime"
                    ).textContent =
                        Math.round(
                            totalTime / 60
                        ) + "m";

                } catch (
                    error
                ) {

                    console.error(
                        error
                    );
                }
            }
        );

    </script>

</body>

</html>
