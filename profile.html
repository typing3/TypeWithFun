 <!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>TypeWithFun • Profile</title>

    <link rel="preconnect"
        href="https://fonts.googleapis.com">

    <link rel="preconnect"
        href="https://fonts.gstatic.com"
        crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <link rel="stylesheet"
        href="style.css">

    <link rel="stylesheet"
        href="components.css">

    <link rel="stylesheet"
        href="animations.css">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

    <div id="particles"
        class="particles"></div>

    <nav class="navbar glass">

        <div class="nav-left">

            <a href="index.html"
                class="btn btn-secondary">

                <i class="fas fa-home"></i>
                Home

            </a>

        </div>

        <div class="nav-center">

            <h2>My Profile</h2>

        </div>

        <div class="nav-right">

            <button onclick="history.back()"
                class="btn btn-secondary">

                Back

            </button>

        </div>

    </nav>

    <main class="profile-page">

        <section class="glass card">

            <div style="text-align:center;">

                <img
                    src="https://cdn-icons-png.flaticon.com/512/149/149071.png"
                    alt="Avatar"
                    style="
                    width:120px;
                    height:120px;
                    border-radius:50%;
                    margin-bottom:15px;
                ">

                <h1 id="usernameDisplay">
                    Typist
                </h1>

                <p>
                    Welcome to your TypeWithFun profile.
                </p>

            </div>

        </section>

        <section class="stats-grid">

            <div class="glass stat-card">

                <span>Best WPM</span>

                <h2 id="bestWpm">
                    0
                </h2>

            </div>

            <div class="glass stat-card">

                <span>Average WPM</span>

                <h2 id="avgWpm">
                    0
                </h2>

            </div>

            <div class="glass stat-card">

                <span>Accuracy</span>

                <h2 id="avgAccuracy">
                    0%
                </h2>

            </div>

            <div class="glass stat-card">

                <span>Tests Completed</span>

                <h2 id="totalTests">
                    0
                </h2>

            </div>

        </section>

        <section class="glass card">

            <h2>
                Recent Results
            </h2>

            <div id="historyContainer">

                <p>
                    No tests completed yet.
                </p>

            </div>

        </section>

    </main>

    <script>

        let history = [];

        try {

            history = JSON.parse(
                localStorage.getItem(
                    "twf_typing_history"
                )
            ) || [];

        } catch {

            history = [];
        }

        const totalTests =
            history.length;

        const bestWpm =
            history.length
                ? Math.max(
                    ...history.map(
                        h => h.wpm || 0
                    )
                )
                : 0;

        const avgWpm =
            history.length
                ? Math.round(
                    history.reduce(
                        (sum, h) =>
                            sum +
                            (h.wpm || 0),
                        0
                    ) / history.length
                )
                : 0;

        const avgAccuracy =
            history.length
                ? Math.round(
                    history.reduce(
                        (sum, h) =>
                            sum +
                            (h.accuracy || 0),
                        0
                    ) / history.length
                )
                : 0;

        document.getElementById(
            "bestWpm"
        ).textContent =
            bestWpm;

        document.getElementById(
            "avgWpm"
        ).textContent =
            avgWpm;

        document.getElementById(
            "avgAccuracy"
        ).textContent =
            avgAccuracy + "%";

        document.getElementById(
            "totalTests"
        ).textContent =
            totalTests;

        const container =
            document.getElementById(
                "historyContainer"
            );

        if (
            history.length > 0
        ) {

            container.innerHTML =
                history
                    .slice()
                    .reverse()
                    .slice(0, 10)
                    .map(
                        result => `
                        <div class="glass card" style="margin-bottom:10px;">
                            <strong>WPM:</strong> ${result.wpm}
                            |
                            <strong>Accuracy:</strong> ${result.accuracy}%
                            |
                            <strong>Category:</strong> ${result.category}
                        </div>
                    `
                    )
                    .join("");
        }

    </script>

</body>

</html>
